<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181826"/>
      <stop offset="1" stop-color="#0b0b11"/>
    </linearGradient>
    <radialGradient id="headGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9af0ff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#9af0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="8" y="8" width="240" height="240" rx="46" fill="url(#tile)"/>
  <rect x="8.5" y="8.5" width="239" height="239" rx="45.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- The poxicle: an edge-particle comet tracing a clean, centred square with
       true 90 degree corners (the empty centre is the "window" the effect rings).
       18px pixels on a 24px pitch, 7 per side. Bright head at the top-left corner;
       a continuous cyan -> blue -> violet -> magenta gradient fades clockwise all
       the way round and chases its own tail back to the head. -->
  <circle cx="56" cy="56" r="25" fill="url(#headGlow)"/>
  <g shape-rendering="crispEdges">
    <!-- top edge, left -> right (head at the corner) -->
    <rect x="47"  y="47"  width="18" height="18" fill="#ffffff"/>
    <rect x="71"  y="47"  width="18" height="18" fill="#dbf9ff" fill-opacity="0.97"/>
    <rect x="95"  y="47"  width="18" height="18" fill="#aceeff" fill-opacity="0.94"/>
    <rect x="119" y="47"  width="18" height="18" fill="#84e6ff" fill-opacity="0.90"/>
    <rect x="143" y="47"  width="18" height="18" fill="#5ad1ff" fill-opacity="0.87"/>
    <rect x="167" y="47"  width="18" height="18" fill="#4ac2f4" fill-opacity="0.84"/>
    <!-- right edge, top -> bottom -->
    <rect x="191" y="47"  width="18" height="18" fill="#3aa6f2" fill-opacity="0.81"/>
    <rect x="191" y="71"  width="18" height="18" fill="#3f93f2" fill-opacity="0.78"/>
    <rect x="191" y="95"  width="18" height="18" fill="#4a80f0" fill-opacity="0.74"/>
    <rect x="191" y="119" width="18" height="18" fill="#5570f0" fill-opacity="0.71"/>
    <rect x="191" y="143" width="18" height="18" fill="#6060ee" fill-opacity="0.67"/>
    <rect x="191" y="167" width="18" height="18" fill="#6f5cf0" fill-opacity="0.64"/>
    <!-- bottom edge, right -> left -->
    <rect x="191" y="191" width="18" height="18" fill="#8056ec" fill-opacity="0.60"/>
    <rect x="167" y="191" width="18" height="18" fill="#8e52e8" fill-opacity="0.56"/>
    <rect x="143" y="191" width="18" height="18" fill="#9c50e4" fill-opacity="0.52"/>
    <rect x="119" y="191" width="18" height="18" fill="#aa4fe0" fill-opacity="0.48"/>
    <rect x="95"  y="191" width="18" height="18" fill="#b84fda" fill-opacity="0.44"/>
    <rect x="71"  y="191" width="18" height="18" fill="#c44fd4" fill-opacity="0.40"/>
    <!-- left edge, bottom -> top (chasing the head) -->
    <rect x="47"  y="191" width="18" height="18" fill="#cf4fce" fill-opacity="0.37"/>
    <rect x="47"  y="167" width="18" height="18" fill="#d44fc6" fill-opacity="0.34"/>
    <rect x="47"  y="143" width="18" height="18" fill="#d84fc0" fill-opacity="0.31"/>
    <rect x="47"  y="119" width="18" height="18" fill="#db4fbc" fill-opacity="0.29"/>
    <rect x="47"  y="95"  width="18" height="18" fill="#dd4fb8" fill-opacity="0.27"/>
  </g>
</svg>
