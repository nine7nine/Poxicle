<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181826"/>
      <stop offset="1" stop-color="#0b0b11"/>
    </linearGradient>
    <radialGradient id="headGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9af0ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9af0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="8" y="8" width="240" height="240" rx="46" fill="url(#tile)"/>
  <rect x="8.5" y="8.5" width="239" height="239" rx="45.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- the "window": pixel panel with a titlebar + traffic-light dots -->
  <g>
    <rect x="80" y="88" width="96" height="80" rx="9" fill="#1c1c27"
          stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
    <rect x="80" y="88" width="96" height="19" rx="9" fill="#272736"/>
    <rect x="80" y="98" width="96" height="9" fill="#272736"/>
    <circle cx="92"  cy="97.5" r="3.1" fill="#ff5f57"/>
    <circle cx="103" cy="97.5" r="3.1" fill="#febc2e"/>
    <circle cx="114" cy="97.5" r="3.1" fill="#28c840"/>
    <!-- faint window content lines -->
    <rect x="92" y="122" width="60" height="5" rx="2" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="92" y="135" width="44" height="5" rx="2" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="92" y="148" width="52" height="5" rx="2" fill="#ffffff" fill-opacity="0.06"/>
  </g>

  <!-- edge-particle tracer: a comet orbiting the window's perimeter clockwise —
       across the top, rounding the top-right corner, down the right side, around
       the bottom-right corner and along the bottom. Bright head leads at the
       bottom; the tail fades back over both corners to the top-left. 14px pixels
       on a 16px pitch so they read as discrete 8-bit blocks. -->
  <circle cx="128" cy="182" r="23" fill="url(#headGlow)"/>
  <g shape-rendering="crispEdges">
    <rect x="121" y="175" width="14" height="14" fill="#ffffff"/>
    <rect x="141" y="175" width="14" height="14" fill="#d4f8ff" fill-opacity="0.95"/>
    <rect x="161" y="175" width="14" height="14" fill="#93e8ff" fill-opacity="0.90"/>
    <rect x="181" y="169" width="14" height="14" fill="#5ad1ff" fill-opacity="0.84"/>
    <rect x="181" y="149" width="14" height="14" fill="#48c2f4" fill-opacity="0.77"/>
    <rect x="181" y="129" width="14" height="14" fill="#3aa6f2" fill-opacity="0.70"/>
    <rect x="181" y="109" width="14" height="14" fill="#3f8cf2" fill-opacity="0.62"/>
    <rect x="181" y="89"  width="14" height="14" fill="#5170f0" fill-opacity="0.54"/>
    <rect x="181" y="69"  width="14" height="14" fill="#6a5cf0" fill-opacity="0.46"/>
    <rect x="161" y="67"  width="14" height="14" fill="#8654ec" fill-opacity="0.38"/>
    <rect x="141" y="67"  width="14" height="14" fill="#a04fe4" fill-opacity="0.30"/>
    <rect x="121" y="67"  width="14" height="14" fill="#ba4fda" fill-opacity="0.22"/>
    <rect x="101" y="67"  width="14" height="14" fill="#cb4fd0" fill-opacity="0.14"/>
    <rect x="83"  y="67"  width="14" height="14" fill="#db4fc4" fill-opacity="0.08"/>
  </g>
</svg>
